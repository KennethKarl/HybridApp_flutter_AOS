# GitLab CI/CD — HybridApp_flutter_AOS (Flutter)
# Flutter 3.41.5 / Dart 3.11.3
# Runner 요구사항: Linux, Docker, Flutter SDK

image: ghcr.io/cirruslabs/flutter:3.41.5

variables:
  ANDROID_COMPILE_SDK: "34"
  ANDROID_BUILD_TOOLS: "34.0.0"

# -------------------------------------------------------------------
# Stages
# -------------------------------------------------------------------
stages:
  - validate
  - build
  - test
  - staging
  - production
  - notify

# -------------------------------------------------------------------
# Validate
# -------------------------------------------------------------------
validate:lint:
  stage: validate
  tags: [docker]
  script:
    - flutter pub get
    - flutter analyze
  rules:
    - if: '$CI_MERGE_REQUEST_IID'
    - if: '$CI_COMMIT_BRANCH =~ /^(develop|release|main)/'

# -------------------------------------------------------------------
# Build
# -------------------------------------------------------------------
build:apk:
  stage: build
  tags: [docker]
  script:
    - flutter pub get
    - flutter build apk --release --split-per-abi
  artifacts:
    paths:
      - build/app/outputs/flutter-apk/*.apk
    expire_in: 7 days
  rules:
    - if: '$CI_MERGE_REQUEST_IID'
    - if: '$CI_COMMIT_BRANCH =~ /^(develop|release|main)/'

build:appbundle:
  stage: build
  tags: [docker]
  script:
    - flutter pub get
    - |
      if [ -n "$KEYSTORE_FILE" ]; then
        echo $KEYSTORE_FILE | base64 -d > android/app/keystore.jks
        flutter build appbundle --release
      else
        flutter build appbundle --release
      fi
  artifacts:
    paths:
      - build/app/outputs/bundle/release/app-release.aab
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^release\//'
    - if: '$CI_COMMIT_BRANCH == "main"'

# -------------------------------------------------------------------
# Test
# -------------------------------------------------------------------
test:unit:
  stage: test
  tags: [docker]
  script:
    - flutter pub get
    - flutter test --coverage
  artifacts:
    paths:
      - coverage/
    expire_in: 7 days
  rules:
    - if: '$CI_MERGE_REQUEST_IID'
    - if: '$CI_COMMIT_BRANCH =~ /^(develop|release|main)/'

# -------------------------------------------------------------------
# Staging Deploy (Firebase App Distribution)
# -------------------------------------------------------------------
deploy:staging:
  stage: staging
  tags: [docker]
  environment:
    name: staging
  script:
    - flutter pub get
    - flutter build apk --release --split-per-abi
    - |
      if [ -f "fastlane/Fastfile" ]; then
        cd fastlane && fastlane firebase_staging
      else
        echo "Fastlane not configured. Manual upload required."
        echo "APK: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
      fi
  needs:
    - test:unit
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^release\//'

# -------------------------------------------------------------------
# Production Deploy (Play Store)
# -------------------------------------------------------------------
deploy:production:
  stage: production
  tags: [docker]
  environment:
    name: production
  when: manual
  script:
    - flutter pub get
    - flutter build appbundle --release
    - |
      if [ -f "fastlane/Fastfile" ]; then
        cd fastlane && fastlane playstore_release
      else
        echo "Fastlane not configured. Manual upload required."
        echo "AAB: build/app/outputs/bundle/release/app-release.aab"
      fi
  needs:
    - test:unit
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# -------------------------------------------------------------------
# Notify (Telegram)
# -------------------------------------------------------------------
notify_success:
  stage: notify
  tags: [docker]
  script:
    - 'curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
      -d "chat_id=${TELEGRAM_CHAT_ID}"
      -d "text=✅ ${CI_PROJECT_NAME} 파이프라인 성공 — ${CI_COMMIT_REF_NAME} (${CI_COMMIT_SHORT_SHA})"'
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_TAG'
      when: on_success

notify_failure:
  stage: notify
  tags: [docker]
  script:
    - 'curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
      -d "chat_id=${TELEGRAM_CHAT_ID}"
      -d "text=❌ ${CI_PROJECT_NAME} 파이프라인 실패 — ${CI_COMMIT_REF_NAME} (${CI_COMMIT_SHORT_SHA})"'
  rules:
    - when: on_failure
